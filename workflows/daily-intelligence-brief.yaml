name: Daily Intelligence Brief
description: |
      Daily intelligence newsletter with ACTUAL tool calls: SearXNG web search, Camoufox page scraping, LLM scoring and synthesis, then email delivery.
      
version: 13
created: '2026-06-24T21:58:24.856402+00:00'
updated: '2026-06-25T01:54:16.041781+00:00'

steps:
  - id: step-3b046521
    label: Generate Search Queries
    type: llm_call
    prompt: |
      You are an intelligence researcher. For the topic "{{input.topic}}", generate:
      
      1. Five targeted search queries to find recent, high-quality content
      2. Two specific communities or forums to check
      
      Return JSON: { search_queries: [string], communities: [string] }
      
    model: gemma-uncensored
    position: [260.0, 80.0]
    authority:
      level: readonly
      cost_limit_cents: 5
      hard_gate: true
      model_allowlist: []
      output_schema: 
      escalation_contact: 
  - id: step-8f192d1b
    label: Search Web Sources
    type: tool_call
    prompt: |
      Execute web searches for {{input.topic}} using ALL queries generated in step 1.
      Return the combined search results with URLs, titles, content snippets, and scores.
      
    tools: ["searxng_search"]
    model: gemma-uncensored
    position: [260.0, 220.0]
    authority:
      level: readonly
      cost_limit_cents: 5
      hard_gate: true
      model_allowlist: []
      output_schema: 
      escalation_contact: 
  - id: step-36893ccc
    label: Scrape Top Pages
    type: tool_call
    prompt: |
      Scrape the top 5 most relevant pages from the search results to extract full content.
      For each URL, extract the full page text, headings, and key metadata.
      
    tools: ["camoufox_scraper"]
    model: gemma-uncensored
    position: [260.0, 360.0]
    authority:
      level: standard
      cost_limit_cents: 15
      hard_gate: true
      model_allowlist: []
      output_schema: 
      escalation_contact: 
  - id: step-a31bca7d
    label: Score & Rank Content
    type: llm_call
    prompt: |
      You are a content analyst. Score each search result for the newsletter "{{input.topic}}" ({{input.date}}).
      
      Below is the real web search data. Each result has a URL, title, content snippet, score, and source engine.
      
      SEARCH RESULTS:
      {{steps.step-search-web.output_text}}
      
      SCRAPED CONTENT:
      {{steps.step-scrape-pages.output_text}}
      
      For each item, evaluate:
      - relevance (1-10): how directly it relates to {{input.topic}}
      - novelty (1-10): how new/breaking the information is (check publishedDate if available)
      - source_quality (1-10): primary source > news article > blog > social
      
      Return ONLY valid JSON:
      {
        "items": [
          {"title": "...", "url": "...", "relevance": 8, "novelty": 7, "source_quality": 9, "score": 8.0, "key_findings": "..."}
        ],
        "top_picks": ["Most important title", "Second pick"],
        "trends_identified": ["Trend 1", "Trend 2"]
      }
      
    model: gemma-uncensored
    position: [260.0, 500.0]
    authority:
      level: standard
      cost_limit_cents: 20
      hard_gate: true
      model_allowlist: []
      output_schema: 
      escalation_contact: 
  - id: step-f20394c7
    label: Synthesize Newsletter
    type: llm_call
    prompt: |
      You are an intelligence analyst. Write the "{{input.topic}}" intelligence brief for {{input.date}} using the REAL scored data below.
      
      SCORED CONTENT (top picks):
      {{steps.step-score-content.top_picks | join: ", "}}
      
      TRENDS IDENTIFIED:
      {{steps.step-score-content.trends_identified | join: ", "}}
      
      FULL SCORED ITEMS:
      {{steps.step-score-content.output_text}}
      
      Write in this format:
      ## Today's System Pattern
      (1 paragraph strategic observation based on actual data)
      
      ## What Changed
      (3-5 items with: what changed, evidence, why it matters, implication)
      
      ## Weak Signals
      (2-3 emerging but unconfirmed signals from the data)
      
      ## Sources
      (linked URLs from the real search results — include at least 3)
      
      Return ONLY valid JSON:
      {
        "subject": "Intelligence Brief: Key Finding — Date",
        "body_markdown": "Full markdown content with all sections...",
        "key_signals": ["Signal 1", "Signal 2", "Signal 3"],
        "sources": ["https://url1.com", "https://url2.com"]
      }
      
    model: gemma-uncensored
    position: [260.0, 640.0]
    authority:
      level: standard
      cost_limit_cents: 25
      hard_gate: true
      model_allowlist: []
      output_schema: 
      escalation_contact: 
  - id: step-1f2fb324
    label: Publish Newsletter
    type: tool_call
    prompt: |
      Send the following intelligence brief via email:
      
      To: {{input.recipient | default: "newsletter@evolvingsoftware.com"}}
      Subject: {{steps.step-synthesize.subject}}
      Body:
      {{steps.step-synthesize.body_markdown}}
      
    tools: ["email_gateway"]
    model: gemma-uncensored
    position: [260.0, 780.0]
    authority:
      level: admin
      cost_limit_cents: 10
      hard_gate: true
      model_allowlist: []
      output_schema: 
      escalation_contact: 

connections:
  - from: step-3b046521
    to: step-8f192d1b
  - from: step-8f192d1b
    to: step-36893ccc
  - from: step-36893ccc
    to: step-a31bca7d
  - from: step-a31bca7d
    to: step-f20394c7
  - from: step-f20394c7
    to: step-1f2fb324
